server {
    listen 80;
    server_name _;

    root /var/www/api/public;
    index index.php;
    
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass api:9000;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}